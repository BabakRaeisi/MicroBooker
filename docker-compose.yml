services:
  redis:
    image: redis:7
    container_name: mb-redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:6
    container_name: mb-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: BookerDb

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: mb-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: mb-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: mb-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
